<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" fill="url(#bg)" rx="40"/>
  <!-- Shield icon -->
  <path d="M400 140 L560 220 L560 400 C560 520 480 600 400 640 C320 600 240 520 240 400 L240 220 Z" fill="none" stroke="url(#accent)" stroke-width="8" stroke-linejoin="round"/>
  <path d="M400 140 L560 220 L560 400 C560 520 480 600 400 640 C320 600 240 520 240 400 L240 220 Z" fill="url(#accent)" opacity="0.08"/>
  <!-- Lock inside shield -->
  <rect x="360" y="370" width="80" height="60" rx="8" fill="none" stroke="#00e5ff" stroke-width="6"/>
  <path d="M360 400 L360 380 C360 355 380 340 400 340 C420 340 440 355 440 380 L440 400" fill="none" stroke="#00e5ff" stroke-width="6" stroke-linecap="round"/>
  <circle cx="400" cy="430" r="8" fill="#00e5ff"/>
  <!-- Devanagari र -->
  <text x="400" y="530" text-anchor="middle" font-size="80" fill="#a855f7" font-family="serif" opacity="0.6">र</text>
  <!-- RAKSHAKAI text -->
  <text x="400" y="710" text-anchor="middle" font-size="48" font-weight="700" fill="white" font-family="system-ui, sans-serif" letter-spacing="6">RAKSHAKAI</text>
  <text x="400" y="750" text-anchor="middle" font-size="22" fill="#00e5ff" font-family="system-ui, sans-serif" letter-spacing="8" opacity="0.8">AI SECURITY</text>
</svg>
